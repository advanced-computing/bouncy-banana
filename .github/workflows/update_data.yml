name: Update FRED NY Insurance Claims Data

on:
  schedule:
    # daily
    - cron: "0 0 * * *"
  # support manual trigger
  workflow_dispatch:

jobs:
  update_data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Update data
        env:
          BQ_BOUNCY_BANANA: ${{ secrets.BQ_BOUNCY_BANANA }}
        run: python ${{ github.workspace }}/fred_data_new.py